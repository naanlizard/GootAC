[platformio]
default_envs = d1_mini

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200

# Required for HomeKit memory optimization
board_build.f_cpu = 160000000L
build_flags =
    -D HOMEKIT_LOG_LEVEL=2
    -D ARDUINO_HOMEKIT_LOWROM
    -D ARDUINO_HOMEKIT_SKIP_ED25519_VERIFY
    -D APP_LOG_LEVEL=4
build_src_filter = +<*> -<cn105_timing_test.cpp>

lib_deps =
    # HomeKit Library
    https://github.com/Mixiaoxiao/Arduino-HomeKit-ESP8266.git
    # Status and State Persistence
    bblanchon/ArduinoJson@^6.21.3
    # Logging
    https://github.com/thijse/Arduino-Log.git
